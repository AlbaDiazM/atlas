<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Atlas">
<meta name="theme-color" content="#1a1a2e">
<title>Atlas — Proyectos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --ink-soft: #3d3d5c;
    --ink-ghost: #8888aa;
    --paper: #f4f1eb;
    --paper-warm: #ede8df;
    --paper-card: #faf8f4;
    --gold: #c8952a;
    --gold-light: #f0c060;
    --gold-pale: #fdf3dc;
    --red: #c0392b;
    --green: #27ae60;
    --shadow-card: 0 2px 20px rgba(26,26,46,0.08), 0 1px 4px rgba(26,26,46,0.05);
    --shadow-panel: 0 8px 40px rgba(26,26,46,0.12);
    --radius: 16px;
    --radius-sm: 10px;
  }

  html {
    height: 100%;
    height: -webkit-fill-available;
    background: #1a1a2e;
    background-color: #1a1a2e;
  }

  body {
    min-height: 100%;
    min-height: -webkit-fill-available;
    font-family: 'DM Sans', sans-serif;
    background: #f4f1eb;
    background-color: #f4f1eb;
    color: #1a1a2e;
    overflow: hidden;
  }

  /* ── Login Screen ───────────────────────────────── */
  #loginScreen {
    position: fixed; inset: 0;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 0;
  }

  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 48px 40px;
    width: 360px;
    max-width: 90vw;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .login-logo {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .login-logo-mark {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .login-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #fff;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .login-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .btn-google {
    width: 100%;
    padding: 14px 20px;
    background: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #1a1a2e;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    transition: all 0.18s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .btn-google:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,0,0,0.4); }
  .btn-google:active { transform: none; }

  .google-icon { width: 20px; height: 20px; }

  .login-error {
    margin-top: 16px;
    font-size: 13px;
    color: #e74c3c;
    min-height: 20px;
  }

  /* ── Loading spinner ────────────────────────────── */
  #loadingScreen {
    position: fixed; inset: 0;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    z-index: 190;
    flex-direction: column;
    gap: 20px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(200,149,42,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
  }

  /* ── App Layout ─────────────────────────────────── */
  .app {
    display: flex;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    min-height: -webkit-fill-available;
    background: #f4f1eb;
  }

  /* ── Sidebar ─────────────────────────────────────── */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: #1a1a2e !important;
    background-color: #1a1a2e !important;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(200,149,42,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .sidebar-header {
    padding: env(safe-area-inset-top, 20px) 24px 20px;
    padding-top: max(32px, env(safe-area-inset-top));
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .app-logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  /* ── User row ───────────────────────────────────── */
  .user-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
  }

  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
    overflow: hidden;
  }

  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .user-name {
    flex: 1;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-logout {
    background: none;
    border: none;
    color: rgba(255,255,255,0.3);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .btn-logout:hover { color: #e74c3c; }

  .sidebar-section-label {
    padding: 20px 24px 8px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }

  .project-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .project-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.18s;
    margin-bottom: 2px;
  }

  .project-item:hover { background: rgba(255,255,255,0.06); }
  .project-item.active { background: rgba(200,149,42,0.15); }
  .project-item.active .project-name { color: var(--gold-light); }

  .project-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .project-name {
    flex: 1;
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .project-count {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.07);
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 500;
  }

  .btn-new-project {
    margin: 12px;
    padding: 12px 16px;
    background: rgba(200,149,42,0.12);
    border: 1px dashed rgba(200,149,42,0.35);
    border-radius: var(--radius-sm);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.18s;
    width: calc(100% - 24px);
  }
  .btn-new-project:hover { background: rgba(200,149,42,0.2); }

  /* ── Sync indicator ─────────────────────────────── */
  .sync-indicator {
    margin: 0 12px 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    display: flex; align-items: center; gap: 6px;
    padding: 0 4px;
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .sync-dot.syncing {
    background: var(--gold);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Main Panel ─────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--paper);
  }

  .main-header {
    padding: 28px 36px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .project-title-area { flex: 1; }

  .project-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }

  .project-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .project-progress-text {
    font-size: 13px;
    color: var(--ink-ghost);
  }

  .progress-bar-wrap {
    width: 120px; height: 4px;
    background: var(--paper-warm);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    padding-top: 4px;
  }

  .btn-icon {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--paper-warm);
    color: var(--ink-soft);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
  }
  .btn-icon:hover { background: var(--paper-card); color: var(--gold); box-shadow: var(--shadow-card); }

  /* ── Filter bar ─────────────────────────────────── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 20px 36px 0;
    align-items: center;
  }

  .filter-pill {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--paper-warm);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-ghost);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-pill.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  .filter-pill:hover:not(.active) { border-color: var(--ink-ghost); color: var(--ink-soft); }

  /* ── Task Area ──────────────────────────────────── */
  .task-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 36px 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--paper-warm) transparent;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--ink-ghost);
    font-size: 14px;
    text-align: center;
  }

  .empty-icon { font-size: 48px; opacity: 0.4; }

  /* ── Task Card ──────────────────────────────────── */
  .task-card {
    background: var(--paper-card);
    border: 1px solid rgba(26,26,46,0.07);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 8px;
    transition: all 0.18s;
    box-shadow: var(--shadow-card);
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-card:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(26,26,46,0.1); }
  .task-card.done { opacity: 0.55; }
  .task-card.done .task-text { text-decoration: line-through; color: var(--ink-ghost); }

  .task-checkbox {
    width: 22px; height: 22px;
    border-radius: 7px;
    border: 2px solid var(--paper-warm);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
    font-size: 13px;
  }
  .task-checkbox.checked { background: var(--green); border-color: var(--green); color: #fff; }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.4;
    word-break: break-word;
  }

  .task-badges {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .badge-priority-alta { background: #fdecea; color: var(--red); }
  .badge-priority-media { background: var(--gold-pale); color: var(--gold); }
  .badge-priority-baja { background: #e8f8f0; color: var(--green); }
  .badge-date { background: var(--paper-warm); color: var(--ink-soft); }

  .task-delete {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--ink-ghost);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    opacity: 0;
  }
  .task-card:hover .task-delete { opacity: 1; }
  .task-delete:hover { background: #fdecea; color: var(--red); }

  /* ── Add Task Bar ───────────────────────────────── */
  .add-task-bar { padding: 0 36px 24px; }

  .add-task-form {
    background: var(--paper-card);
    border: 1px solid rgba(26,26,46,0.09);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }

  .add-task-row {
    display: flex;
    align-items: center;
  }

  .add-task-input {
    flex: 1;
    padding: 15px 20px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
  }
  .add-task-input::placeholder { color: var(--ink-ghost); }

  .add-task-options {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px 0 0;
  }

  .option-select {
    padding: 6px 10px;
    border: 1px solid var(--paper-warm);
    border-radius: 8px;
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    outline: none;
  }

  .btn-add-task {
    padding: 10px 20px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    margin-right: 8px;
  }
  .btn-add-task:hover { background: var(--gold); }

  /* ── Welcome ────────────────────────────────────── */
  .welcome-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
    text-align: center;
  }

  .welcome-icon { font-size: 56px; }

  .welcome-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--ink);
    font-weight: 700;
  }

  .welcome-text {
    font-size: 15px;
    color: var(--ink-ghost);
    max-width: 320px;
    line-height: 1.6;
  }

  .btn-welcome {
    margin-top: 8px;
    padding: 14px 28px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-welcome:hover { background: var(--gold); }

  /* ── Modal ──────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,46,0.45);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--paper-card);
    border-radius: 20px;
    padding: 32px;
    width: 440px;
    max-width: 90vw;
    box-shadow: var(--shadow-panel);
    transform: translateY(12px) scale(0.97);
    transition: transform 0.2s ease;
  }
  .modal-overlay.open .modal { transform: none; }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .form-field { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--ink-ghost);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--paper-warm);
    border-radius: var(--radius-sm);
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border 0.15s;
  }
  .form-input:focus { border-color: var(--gold); }

  .color-picker-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: border-color 0.15s;
  }
  .color-swatch.selected { border-color: var(--ink); }

  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;
  }

  .btn-cancel {
    padding: 10px 20px;
    border: 1px solid var(--paper-warm);
    border-radius: var(--radius-sm);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--paper-warm); }

  .btn-confirm {
    padding: 10px 24px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--ink);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-confirm:hover { background: var(--gold); }

  /* ── Scrollbar ──────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(26,26,46,0.12); border-radius: 2px; }

  /* ── Portrait Mode ───────────────────────────────── */
  @media (orientation: portrait), (max-width: 820px) {

    html, body { overflow: hidden; }
    .app { flex-direction: column; }

    .sidebar {
      width: 100%;
      min-width: unset;
      height: auto;
      flex-direction: column;
      background: #1a1a2e !important;
      background-color: #1a1a2e !important;
    }

    .sidebar-header {
      padding-top: max(52px, calc(env(safe-area-inset-top) + 16px));
      padding-bottom: 10px;
      padding-left: 20px;
      padding-right: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
      gap: 8px;
    }

    .user-row {
      margin-top: 0;
      flex-shrink: 0;
      max-width: 180px;
    }

    .sidebar-section-label { display: none; }

    .project-list {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 12px 12px;
      gap: 8px;
      scrollbar-width: none;
      flex: unset;
    }
    .project-list::-webkit-scrollbar { display: none; }

    .project-item {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      margin-bottom: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      width: auto;
    }
    .project-item.active {
      background: rgba(200,149,42,0.2);
      border-color: rgba(200,149,42,0.4);
    }
    .project-name {
      font-size: 13px;
      white-space: nowrap;
      overflow: visible;
      text-overflow: unset;
      max-width: 140px;
    }

    .btn-new-project {
      flex-shrink: 0;
      width: auto;
      margin: 0 4px 2px 4px;
      padding: 8px 14px;
      border-radius: 20px;
      white-space: nowrap;
      align-self: center;
    }

    .sync-indicator { display: none; }

    .main { flex: 1; overflow: hidden; }
    .main-header { padding: 16px 18px 0; }
    .project-title { font-size: 22px; }
    .filter-bar { padding: 12px 18px 0; gap: 6px; }
    .filter-pill { padding: 5px 12px; font-size: 11px; }
    .task-area { padding: 14px 18px 20px; }
    .task-card { padding: 14px 14px; }
    .task-delete { opacity: 1; }
    .add-task-bar { padding: 0 18px 20px; }
    .add-task-input { padding: 13px 16px; font-size: 14px; }
    .add-task-options { padding: 0 8px 0 0; }
    .modal { width: 92vw; padding: 24px 20px; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div style="font-family:'Playfair Display',serif;font-size:32px;color:#fff;display:flex;align-items:center;gap:10px">
    <span style="width:40px;height:40px;background:#c8952a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px">◈</span>
    Atlas
  </div>
  <div class="spinner"></div>
  <div class="loading-text">Conectando…</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-mark">◈</span> Atlas
    </div>
    <div class="login-subtitle">Gestor de Proyectos</div>
    <div class="login-title">Bienvenido</div>
    <div class="login-desc">Inicia sesión para acceder a tus proyectos desde cualquier dispositivo.</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appShell" style="display:none">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-logo">
        <span class="logo-mark">◈</span> Atlas
      </div>
      <div class="user-row" id="userRow">
        <div class="user-avatar" id="userAvatar">?</div>
        <span class="user-name" id="userName">…</span>
        <button class="btn-logout" title="Cerrar sesión" onclick="logout()">⏻</button>
      </div>
    </div>

    <div class="sidebar-section-label">Proyectos</div>
    <div class="project-list" id="projectList"></div>

    <button class="btn-new-project" onclick="openNewProjectModal()">
      <span style="font-size:16px">＋</span> Nuevo Proyecto
    </button>

    <div class="sync-indicator" id="syncIndicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Sincronizado</span>
    </div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="welcome-panel">
      <div class="welcome-icon">🗂️</div>
      <div class="welcome-title">Bienvenido a Atlas</div>
      <div class="welcome-text">Organiza tus proyectos y desglósalos en tareas concretas.</div>
      <button class="btn-welcome" onclick="openNewProjectModal()">Crear primer proyecto</button>
    </div>
  </main>
</div>

<!-- MODAL NUEVO PROYECTO -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-title">Nuevo Proyecto</div>
    <div class="form-field">
      <label class="form-label">Nombre del Proyecto</label>
      <input class="form-input" id="newProjectName" placeholder="Ej: Rediseño de sitio web" maxlength="60">
    </div>
    <div class="form-field">
      <label class="form-label">Color</label>
      <div class="color-picker-row" id="colorPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('projectModal')">Cancelar</button>
      <button class="btn-confirm" onclick="createProject()">Crear Proyecto</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot,
         addDoc, updateDoc, deleteDoc, serverTimestamp, query, orderBy }
                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase config ───────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBJ2eFFNXloUcNt3rhPXExy2R0T_h5gFic",
  authDomain: "atlas-proyectos.firebaseapp.com",
  projectId: "atlas-proyectos",
  storageBucket: "atlas-proyectos.firebasestorage.app",
  messagingSenderId: "890895024787",
  appId: "1:890895024787:web:e0752f68d7a89bece54366"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ─────────────────────────────────────────────
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#27ae60','#1abc9c','#3498db','#9b59b6','#e91e63','#607d8b','#c8952a'];
let selectedColor = COLORS[5];
let projects = [];          // local cache from Firestore
let activeProjectId = null;
let activeFilter    = 'todas';
let currentUser     = null;
let unsubProjects   = null; // Firestore listener cleanup

// ── Auth ──────────────────────────────────────────────
window.loginGoogle = async () => {
  document.getElementById('loginError').textContent = '';
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch (e) {
    document.getElementById('loginError').textContent =
      e.code === 'auth/popup-closed-by-user' ? 'Inicio cancelado.' : 'Error al iniciar sesión. Intenta de nuevo.';
  }
};

window.logout = async () => {
  if (!confirm('¿Cerrar sesión?')) return;
  if (unsubProjects) unsubProjects();
  projects = []; activeProjectId = null;
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    showApp(user);
    subscribeProjects(user.uid);
  } else {
    currentUser = null;
    if (unsubProjects) { unsubProjects(); unsubProjects = null; }
    showLogin();
  }
});

// ── UI state transitions ──────────────────────────────
function showApp(user) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display   = 'none';
  document.getElementById('appShell').style.display      = 'flex';

  // User info
  const nameEl   = document.getElementById('userName');
  const avatarEl = document.getElementById('userAvatar');
  nameEl.textContent = user.displayName || user.email || 'Usuario';
  if (user.photoURL) {
    avatarEl.innerHTML = `<img src="${user.photoURL}" alt="">`;
  } else {
    avatarEl.textContent = (user.displayName || 'U')[0].toUpperCase();
  }
}

function showLogin() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display   = 'flex';
  document.getElementById('appShell').style.display      = 'none';
}

// ── Firestore: realtime listener ──────────────────────
function subscribeProjects(uid) {
  setSyncing(true);
  const q = query(collection(db, 'users', uid, 'projects'), orderBy('createdAt', 'desc'));
  unsubProjects = onSnapshot(q, snap => {
    projects = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
    setSyncing(false);
    renderSidebar();
    // Keep active project selected if it still exists
    if (activeProjectId && projects.find(p => p.firestoreId === activeProjectId)) {
      renderMain();
    } else if (projects.length) {
      selectProject(projects[0].firestoreId);
    } else {
      activeProjectId = null;
      showWelcome();
    }
  }, err => {
    console.error(err);
    setSyncing(false);
  });
}

// ── Sync indicator ────────────────────────────────────
function setSyncing(on) {
  const dot  = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (!dot) return;
  dot.className  = 'sync-dot' + (on ? ' syncing' : '');
  text.textContent = on ? 'Sincronizando…' : 'Sincronizado';
}

// ── Project CRUD ──────────────────────────────────────
window.openNewProjectModal = () => {
  selectedColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  renderColorPicker();
  document.getElementById('newProjectName').value = '';
  openModal('projectModal');
  setTimeout(() => document.getElementById('newProjectName').focus(), 200);
};

window.createProject = async () => {
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) { document.getElementById('newProjectName').focus(); return; }
  closeModal('projectModal');
  setSyncing(true);
  await addDoc(collection(db, 'users', currentUser.uid, 'projects'), {
    name,
    color: selectedColor,
    tasks: [],
    createdAt: serverTimestamp()
  });
  // onSnapshot will update the UI
};

window.deleteProject = async (firestoreId) => {
  if (!confirm('¿Eliminar este proyecto y todas sus tareas?')) return;
  setSyncing(true);
  await deleteDoc(doc(db, 'users', currentUser.uid, 'projects', firestoreId));
};

// ── Task CRUD ─────────────────────────────────────────
window.addTask = async (firestoreId) => {
  const input    = document.getElementById('newTaskInput');
  const text     = input.value.trim();
  if (!text) { input.focus(); return; }
  const priority = document.getElementById('taskPriority').value;
  const project  = projects.find(p => p.firestoreId === firestoreId);
  const newTask  = { id: uid(), text, priority, done: false, created: Date.now() };
  const updated  = [newTask, ...(project.tasks || [])];
  input.value = '';
  input.focus();
  setSyncing(true);
  await updateDoc(doc(db, 'users', currentUser.uid, 'projects', firestoreId), { tasks: updated });
};

window.toggleTask = async (firestoreId, taskId) => {
  const project = projects.find(p => p.firestoreId === firestoreId);
  const updated = project.tasks.map(t => t.id === taskId ? { ...t, done: !t.done } : t);
  setSyncing(true);
  await updateDoc(doc(db, 'users', currentUser.uid, 'projects', firestoreId), { tasks: updated });
};

window.deleteTask = async (firestoreId, taskId) => {
  const project = projects.find(p => p.firestoreId === firestoreId);
  const updated = project.tasks.filter(t => t.id !== taskId);
  setSyncing(true);
  await updateDoc(doc(db, 'users', currentUser.uid, 'projects', firestoreId), { tasks: updated });
};

// ── Render Sidebar ────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('projectList');
  if (!el) return;
  if (!projects.length) { el.innerHTML = ''; return; }
  el.innerHTML = projects.map(p => {
    const done  = (p.tasks || []).filter(t => t.done).length;
    const total = (p.tasks || []).length;
    return `
      <div class="project-item${p.firestoreId === activeProjectId ? ' active' : ''}"
           onclick="selectProject('${p.firestoreId}')">
        <div class="project-dot" style="background:${p.color}"></div>
        <span class="project-name">${escHtml(p.name)}</span>
        <span class="project-count">${done}/${total}</span>
      </div>`;
  }).join('');
}

// ── Select Project ────────────────────────────────────
window.selectProject = (id) => {
  activeProjectId = id;
  activeFilter    = 'todas';
  renderSidebar();
  renderMain();
};

// ── Render Main ───────────────────────────────────────
function renderMain() {
  const project = projects.find(p => p.firestoreId === activeProjectId);
  if (!project) { showWelcome(); return; }

  const tasks  = project.tasks || [];
  const total  = tasks.length;
  const done   = tasks.filter(t => t.done).length;
  const pct    = total ? Math.round((done / total) * 100) : 0;

  let filtered = tasks;
  if (activeFilter === 'pendientes')  filtered = tasks.filter(t => !t.done);
  if (activeFilter === 'completadas') filtered = tasks.filter(t => t.done);

  document.getElementById('mainPanel').innerHTML = `
    <div class="main-header">
      <div class="project-title-area">
        <div class="project-title">${escHtml(project.name)}</div>
        <div class="project-meta">
          <span class="project-progress-text">${done} de ${total} tareas completadas</span>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <span class="project-progress-text" style="color:var(--gold);font-weight:500">${pct}%</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" onclick="deleteProject('${project.firestoreId}')">🗑</button>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-pill${activeFilter==='todas'?' active':''}" onclick="setFilter('todas')">Todas</button>
      <button class="filter-pill${activeFilter==='pendientes'?' active':''}" onclick="setFilter('pendientes')">Pendientes</button>
      <button class="filter-pill${activeFilter==='completadas'?' active':''}" onclick="setFilter('completadas')">Completadas</button>
    </div>

    <div class="task-area">${renderTasks(filtered, project)}</div>

    <div class="add-task-bar">
      <div class="add-task-form">
        <div class="add-task-row">
          <input class="add-task-input" id="newTaskInput" placeholder="Añadir nueva tarea…" maxlength="200"
            onkeydown="if(event.key==='Enter') addTask('${project.firestoreId}')">
          <div class="add-task-options">
            <select class="option-select" id="taskPriority">
              <option value="media">⚡ Media</option>
              <option value="alta">🔴 Alta</option>
              <option value="baja">🟢 Baja</option>
            </select>
          </div>
          <div style="padding:8px 8px 8px 0">
            <button class="btn-add-task" onclick="addTask('${project.firestoreId}')">Agregar</button>
          </div>
        </div>
      </div>
    </div>
  `;
  setTimeout(() => { const i = document.getElementById('newTaskInput'); if (i) i.focus(); }, 50);
}

function renderTasks(tasks, project) {
  if (!tasks.length) return `
    <div class="empty-state">
      <div class="empty-icon">✦</div>
      <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--ink-soft)">Sin tareas aquí</div>
      <div>Agrega la primera tarea de este proyecto</div>
    </div>`;

  return tasks.map(t => `
    <div class="task-card${t.done ? ' done' : ''}">
      <div class="task-checkbox${t.done ? ' checked' : ''}"
           onclick="toggleTask('${project.firestoreId}','${t.id}')">
        ${t.done ? '✓' : ''}
      </div>
      <div class="task-body">
        <div class="task-text">${escHtml(t.text)}</div>
        <div class="task-badges">
          <span class="badge badge-priority-${t.priority}">${priorityLabel(t.priority)}</span>
          <span class="badge badge-date">${formatDate(t.created)}</span>
        </div>
      </div>
      <button class="task-delete" onclick="deleteTask('${project.firestoreId}','${t.id}')">×</button>
    </div>`).join('');
}

function showWelcome() {
  const el = document.getElementById('mainPanel');
  if (!el) return;
  el.innerHTML = `
    <div class="welcome-panel">
      <div class="welcome-icon">🗂️</div>
      <div class="welcome-title">Sin Proyectos</div>
      <div class="welcome-text">Crea un nuevo proyecto para empezar a organizar tus tareas.</div>
      <button class="btn-welcome" onclick="openNewProjectModal()">Crear Proyecto</button>
    </div>`;
}

// ── Filter ────────────────────────────────────────────
window.setFilter = (f) => { activeFilter = f; renderMain(); };

// ── Color picker ──────────────────────────────────────
function renderColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
    `<div class="color-swatch${c === selectedColor ? ' selected' : ''}"
          style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

window.pickColor = (c) => { selectedColor = c; renderColorPicker(); };

// ── Modal helpers ─────────────────────────────────────
window.openModal  = (id) => document.getElementById(id).classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');

document.querySelectorAll('.modal-overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); })
);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => closeModal(el.id));
});

// ── Utils ─────────────────────────────────────────────
function uid()     { return Math.random().toString(36).slice(2, 10); }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function priorityLabel(p) { return { alta:'🔴 Alta', media:'⚡ Media', baja:'🟢 Baja' }[p] || p; }
function formatDate(ts)   { return new Date(ts).toLocaleDateString('es-MX',{day:'numeric',month:'short'}); }

</script>
</body>
</html>
